name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Build the same pyenv/ venv the Makefile and local development use, so CI runs the
      # exact same commands a developer runs.
      #
      # --upgrade-deps matters: a venv is seeded with whatever pip its interpreter bundles in
      # ensurepip, which for the older matrix entries is old enough that pip-audit fails the
      # security gate on the seed itself (3.11 seeds pip 24.0 and setuptools 79.0.1, 3.12 seeds
      # pip 25.0.1). That is CI's own scaffolding, not anything setlistkit declares, but the
      # gate cannot tell the difference. Pull the seed from PyPI instead of from the tarball.
      - name: Bootstrap venv
        run: |
          python -m venv --upgrade-deps pyenv
          make dev

      - name: Lint, test, security
        run: make check
