name: CI

on:
  push:
    branches: [main]
  pull_request:

# Nothing here writes to the repo, so ask for nothing. A workflow that cannot push cannot be
# turned into one that does by a compromised action.
permissions: read-all

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      # Actions are pinned to a commit SHA, not a tag. A tag is a moving pointer the action's
      # owner can repoint at any time, so `@v7` is a standing agreement to run whatever they
      # publish next; a SHA is not repointable. The trailing comment carries the human-readable
      # version, and dependabot (.github/dependabot.yml) rewrites both together.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      # Build the same pyenv/ venv the Makefile and local development use, so CI runs the
      # exact same commands a developer runs.
      #
      # --upgrade-deps matters: a venv is seeded with whatever pip its interpreter bundles in
      # ensurepip, which for the older matrix entries is old enough that pip-audit fails the
      # security gate on the seed itself (3.11 seeds pip 24.0 and setuptools 79.0.1, 3.12 seeds
      # pip 25.0.1). That is CI's own scaffolding, not anything setlistkit declares, but the
      # gate cannot tell the difference. Pull the seed from PyPI instead of from the tarball.
      - name: Bootstrap venv
        run: |
          python -m venv --upgrade-deps pyenv
          make dev

      - name: Lint, test, security
        run: make check
