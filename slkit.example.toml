# setlistkit configuration — copy to slkit.toml and edit.
#
# This file never holds a credential and is safe to commit in a deployment repo. The
# setlist.fm API key lives in its own file, referenced by path below. Config resolution
# order (first match wins): --config flag, SLKIT_CONFIG env var, ./slkit.toml,
# $XDG_CONFIG_HOME/setlistkit/config.toml.

# Where all mutable state lives — deliberately outside the repository. Raw source snapshots
# go under <data_root>/raw/; everything derived goes into <data_root>/setlistkit.sqlite.
# A relative path is resolved against this config file's directory.
data_root = "~/setlistkit-data"

# Identifies THIS deployment to every upstream API, and gives them a contact. The program
# refuses to make any network call while this is still the placeholder: identify yourself,
# or do not run. Do not impersonate a browser, and do not claim to be setlistkit itself —
# the identity belongs to whoever runs this deployment.
#
# This is a PREFIX. A bulk run — a pull of a whole collection is thousands of requests —
# appends a second comment naming the run and where it has got to:
#
#   user_agent  = "famoe.ly/0.1 (+mailto:you@example.com; AI agent)"
#   on the wire = "famoe.ly/0.1 (+mailto:you@example.com; AI agent) (batch 3f7a9c21; item 100/4514)"
#
# so a host can tell one job from twenty, see that it is finite, and grep their logs for it
# afterwards. The batch id is printed at the start of the run so it is in your logs too.
user_agent = "CHANGE-ME (setlistkit; you@example.com)"

# Set false to send user_agent exactly as written, with nothing appended. The default is true:
# being legible to the host whose bandwidth you are spending is the better default and it costs
# nothing. Turn it off if an upstream keys on an exact registered User-Agent string.
# user_agent_batch_progress = true

[catalog]
# The band pack: identity, vocabulary, aliases, and classifier rules — data you own, not
# code shipped with the tool. Point this at your pack directory; a relative path is anchored
# at this config file's directory. Copy examples/packs/example to start your own, and run
# `slkit pack lint` before you trust it.
pack = "../moe-pack"

[sources.archive_org]
# The archive.org collection holding this band's tapes. `slkit pull archive_org` lists it,
# then fetches each item's metadata once and caches it, so a re-run costs archive.org nothing.
collection = "moe"
# Optional floor on the PLAY year, unquoted. A show taped in 1997 and uploaded last week is
# still a 1997 show, and a recency-weighted model scores it near zero either way — the floor
# just keeps its songs out of the vocabulary.
#
# CAVEAT, and the reason this ships commented out: the filter is a range query on archive.org's
# indexed `year` field, and a range query matches only items that HAVE that field. An item whose
# uploader filled in a date but whose `year` never got indexed is excluded by ANY min_year,
# whenever the show happened. Set it only if you would rather lose those than keep old shows;
# leave it out for no floor at all, which is the default.
# min_year = 2020

[sources.setlistfm]
mbid = "..."
# A path to a file containing only the key. It is perm-checked before use: world-readable
# is a hard failure. Never inline the key here, and never put it in an env var.
api_key_file = "~/.config/setlistkit/setlistfm.api_key"

[report]
# Only used when setlistkit[report] is installed.
out_dir = "../site"
templates = "../templates"

[reports.songbook]
# Settled 2026-07-22 (docs/plans/2026-07-22-songbook-design.md, "The publishing window is a
# choice, not a limitation"): the Songbook publishes roughly 2020 onward, not the full corpus
# -- its tiers are SHARE OF SHOWS IN THE WINDOW, so a wider window flattens every percentage by
# construction, which is not true of the Tape Measure and is the reason the two pages do not
# share one window.
#
# anchor = "last_show" rather than a literal date: the window is a pure function of the data,
# so two runs over the same store agree (the golden-file test depends on this) and the window
# slides forward on its own as new shows are ingested, with nobody editing this file to do it.
[reports.songbook.window]
anchor = "last_show"
# Six years is the outer edge of the range slice 3 retuned the tier thresholds against
# (docs/plans/2026-07-22-songbook-slice-3-tuning-plan.md). Worked example: anchor 2026-06-14
# minus P6Y resolves to 2020-06-14. Verify with:
#   slkit export --config slkit.toml --explain
#
# PROVISIONAL as of 2026-07-22: approved pending Task 7's real-data acceptance checks (>=10
# top-tier songs at this window, >=7 at an 18-month window), run against a real songbook.json.
# Not settled until those pass -- see Task 6's GATE note. If they fail, this value changes.
since_back = "P6Y"
# until omitted: the window's end is the anchor itself.
